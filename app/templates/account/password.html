{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto" x-data="pwApp()" x-init="">

  <div class="card">
    <div class="card-header" style="padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.07)">
      <h5 class="text-base font-semibold flex items-center gap-2 mb-0">
        <i class="fas fa-key text-indigo-400"></i> Change Password
      </h5>
    </div>
    <div class="p-6 space-y-4">

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1">Current password</label>
        <input x-model="form.current" type="password"
          class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500"
          placeholder="Your current password"/>
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1">New password</label>
        <input x-model="form.new_password" type="password"
          class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500"
          placeholder="At least 8 characters"/>
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1">Confirm new password</label>
        <input x-model="form.confirm" type="password"
          class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500"
          placeholder="Repeat new password"/>
      </div>

      <div x-show="error" class="text-red-400 text-sm bg-red-900/20 border border-red-700/40 rounded-lg px-4 py-2.5" x-text="error"></div>
      <div x-show="success" class="text-emerald-400 text-sm bg-emerald-900/20 border border-emerald-700/40 rounded-lg px-4 py-2.5">
        <i class="fas fa-check mr-1"></i> Password changed successfully!
      </div>

      <button @click="submit()" :disabled="saving"
        class="w-full bg-indigo-600 hover:bg-indigo-700 transition font-semibold rounded-xl py-3 text-sm flex items-center justify-center gap-2 disabled:opacity-60">
        <span x-show="saving" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        <span x-text="saving ? 'Saving…' : 'Change password'"></span>
      </button>

      <div class="pt-2 border-t border-slate-700 flex items-center justify-between">
        <a href="/account/2fa" class="text-xs text-indigo-400 hover:text-indigo-300 transition">
          <i class="fas fa-shield-alt mr-1"></i>Two-factor authentication
        </a>
      </div>

    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
function pwApp() {
  return {
    form:    { current: '', new_password: '', confirm: '' },
    saving:  false,
    error:   '',
    success: false,

    async submit() {
      this.error   = '';
      this.success = false;

      if (!this.form.current)        { this.error = 'Please enter your current password'; return; }
      if (this.form.new_password.length < 8) { this.error = 'New password must be at least 8 characters'; return; }
      if (this.form.new_password !== this.form.confirm) { this.error = 'Passwords do not match'; return; }

      this.saving = true;
      try {
        const res = await fetch('/api/account/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ current_password: this.form.current, new_password: this.form.new_password }),
        });
        const data = await res.json();
        if (!res.ok) { this.error = data.detail || 'Failed to change password'; return; }
        this.success = true;
        this.form    = { current: '', new_password: '', confirm: '' };
      } catch (e) {
        this.error = 'Network error — please try again';
      } finally {
        this.saving = false;
      }
    },
  };
}
</script>
{% endblock %}
