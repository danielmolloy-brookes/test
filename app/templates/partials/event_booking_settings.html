{#
  Public slot-booking admin panel.
  Include on the event detail page with:
    {% include "partials/event_booking_settings.html" %}
  Expects: event, request, user
#}
<div class="card mt-6" x-data="bookingAdmin()" x-init="init()">
  <div class="card-header flex items-center justify-between" style="padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.07)">
    <h5 class="text-base font-semibold flex items-center gap-2 mb-0">
      <i class="fas fa-calendar-check text-red-400"></i>
      Public Slot Booking
    </h5>
    <div class="flex items-center gap-2">
      <span class="text-xs" :class="enabled ? 'text-emerald-400' : 'text-slate-500'" x-text="enabled ? 'Enabled' : 'Disabled'"></span>
      <button @click="toggleEnabled()"
        :class="enabled ? 'bg-red-600 hover:bg-red-700' : 'bg-slate-700 hover:bg-slate-600'"
        class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors">
        <span :class="enabled ? 'translate-x-6' : 'translate-x-1'"
              class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform shadow"></span>
      </button>
    </div>
  </div>

  <div class="p-6 space-y-6">

    <!-- Config -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="label">Slot duration (minutes)</label>
        <input type="number" min="5" max="480" x-model.number="duration"
               @change="saveConfig()"
               class="input" placeholder="30"/>
      </div>
      <div>
        <label class="label">Capacity per slot</label>
        <input type="number" min="1" max="500" x-model.number="capacity"
               @change="saveConfig()"
               class="input" placeholder="1"/>
      </div>
    </div>

    <!-- Public booking URL -->
    <template x-if="enabled">
      <div class="bg-slate-700/50 rounded-lg px-4 py-3 flex items-center gap-3">
        <i class="fas fa-link text-red-400 shrink-0"></i>
        <div class="flex-1 min-w-0">
          <p class="text-xs text-slate-400 mb-0.5">Public booking page</p>
          <a :href="`/book/{{ event.id }}`" target="_blank"
             class="text-sm text-red-300 hover:text-red-200 font-mono truncate block">
            {{ request.base_url }}book/{{ event.id }}
          </a>
        </div>
        <button @click="copyLink()" class="text-slate-400 hover:text-white transition text-xs px-2 py-1 rounded bg-slate-700">
          <i class="fas fa-copy"></i>
        </button>
      </div>
    </template>

    <!-- Generate slots -->
    <div class="border-t border-slate-700 pt-5">
      <h6 class="text-sm font-semibold mb-3">Generate time slots</h6>
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="label">Date</label>
          <input type="date" x-model="genDate" class="input"/>
        </div>
        <div>
          <label class="label">From</label>
          <input type="time" x-model="genStart" class="input"/>
        </div>
        <div>
          <label class="label">To</label>
          <input type="time" x-model="genEnd" class="input"/>
        </div>
      </div>
      <div class="flex gap-2 mt-3">
        <button @click="generateSlots()"
          :disabled="generating"
          class="btn-primary flex-1">
          <span x-show="generating" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          <i x-show="!generating" class="fas fa-magic"></i>
          <span x-text="generating ? 'Generating…' : 'Generate slots'"></span>
        </button>
        <button @click="clearSlots()" class="btn-secondary" title="Delete all future empty slots">
          <i class="fas fa-trash-alt"></i>
        </button>
      </div>
      <p x-show="genMsg" class="text-xs mt-2" :class="genErr ? 'text-red-400' : 'text-emerald-400'" x-text="genMsg"></p>
    </div>

    <!-- Bookings list -->
    <div class="border-t border-slate-700 pt-5">
      <div class="flex items-center justify-between mb-3">
        <h6 class="text-sm font-semibold">Slot bookings</h6>
        <button @click="loadBookings()" class="text-slate-400 hover:text-white text-xs transition">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>

      <div x-show="loadingBookings" class="flex justify-center py-6">
        <div class="w-5 h-5 border-2 border-red-400/30 border-t-red-400 rounded-full animate-spin"></div>
      </div>

      <div x-show="!loadingBookings && slotGroups.length === 0" class="text-slate-500 text-sm text-center py-6">
        No slots yet — generate some above.
      </div>

      <div class="space-y-3" x-show="!loadingBookings && slotGroups.length > 0">
        <template x-for="slot in slotGroups" :key="slot.slot_id">
          <div class="bg-slate-800/60 rounded-xl overflow-hidden border border-slate-700">
            <!-- Slot header -->
            <div class="flex items-center justify-between px-4 py-2.5 bg-slate-700/50">
              <div>
                <span class="text-sm font-medium" x-text="formatSlotTime(slot.start_time, slot.end_time)"></span>
                <span class="ml-2 text-xs text-slate-400"
                      x-text="`${slot.booked_count}/${slot.capacity} booked`"></span>
              </div>
              <span class="text-xs font-semibold px-2 py-0.5 rounded-full"
                :class="slot.available
                  ? 'bg-emerald-900/50 text-emerald-300 border border-emerald-700'
                  : 'bg-red-900/50 text-red-300 border border-red-700'"
                x-text="slot.available ? 'Available' : 'Full'">
              </span>
            </div>
            <!-- Bookings -->
            <template x-if="slot.bookings.length > 0">
              <ul class="divide-y divide-slate-700/50">
                <template x-for="b in slot.bookings" :key="b.id">
                  <li class="flex items-center justify-between px-4 py-2.5">
                    <div class="min-w-0">
                      <p class="text-sm font-medium truncate" x-text="b.full_name"></p>
                      <p class="text-xs text-slate-400 truncate" x-text="b.email"></p>
                    </div>
                    <button @click="cancelBooking(b.id, slot)"
                      class="text-slate-500 hover:text-red-400 transition ml-3 shrink-0 text-xs"
                      title="Cancel booking">
                      <i class="fas fa-times-circle"></i>
                    </button>
                  </li>
                </template>
              </ul>
            </template>
            <template x-if="slot.bookings.length === 0">
              <p class="text-xs text-slate-600 px-4 py-2.5">No bookings yet</p>
            </template>
          </div>
        </template>
      </div>
    </div>

  </div><!-- /card body -->
</div>

<script>
function bookingAdmin() {
  const EVENT_ID = {{ event.id }};
  return {
    enabled:         {{ 'true' if event.booking_enabled else 'false' }},
    duration:        {{ event.slot_duration_mins }},
    capacity:        {{ event.slot_capacity }},
    genDate:         '',
    genStart:        '09:00',
    genEnd:          '17:00',
    generating:      false,
    genMsg:          '',
    genErr:          false,
    slotGroups:      [],
    loadingBookings: false,

    init() { this.loadBookings(); },

    async apiFetch(path, opts = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        ...opts,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
      return data;
    },

    async toggleEnabled() {
      this.enabled = !this.enabled;
      await this.saveConfig();
    },

    async saveConfig() {
      try {
        await this.apiFetch(`/api/admin/events/${EVENT_ID}/booking`, {
          method: 'PATCH',
          body: JSON.stringify({ enabled: this.enabled, slot_duration_mins: this.duration, slot_capacity: this.capacity }),
        });
      } catch (e) {
        window.dispatchEvent(new CustomEvent('show-toast', { detail: { message: e.message, type: 'error' } }));
      }
    },

    async generateSlots() {
      if (!this.genDate) { this.genMsg = 'Please pick a date'; this.genErr = true; return; }
      this.generating = true; this.genMsg = ''; this.genErr = false;
      try {
        const data = await this.apiFetch(`/api/admin/events/${EVENT_ID}/slots/generate`, {
          method: 'POST',
          body: JSON.stringify({ date: this.genDate, start_time: this.genStart, end_time: this.genEnd }),
        });
        this.genMsg = `✓ Created ${data.created} slots (${data.slot_duration_mins} min each)`;
        await this.loadBookings();
      } catch (e) {
        this.genMsg = e.message; this.genErr = true;
      } finally {
        this.generating = false;
      }
    },

    async clearSlots() {
      if (!confirm('Delete all future empty slots?')) return;
      try {
        const data = await this.apiFetch(`/api/admin/events/${EVENT_ID}/slots`, { method: 'DELETE' });
        this.genMsg = `✓ Deleted ${data.deleted} empty slots`;
        await this.loadBookings();
      } catch (e) {
        this.genMsg = e.message; this.genErr = true;
      }
    },

    async loadBookings() {
      this.loadingBookings = true;
      try {
        this.slotGroups = await this.apiFetch(`/api/admin/events/${EVENT_ID}/slot-bookings`);
      } catch (e) { /* silent */ } finally {
        this.loadingBookings = false;
      }
    },

    async cancelBooking(bookingId, slot) {
      if (!confirm('Cancel this booking?')) return;
      try {
        await this.apiFetch(`/api/admin/slot-bookings/${bookingId}`, { method: 'DELETE' });
        slot.bookings = slot.bookings.filter(b => b.id !== bookingId);
        slot.booked_count = Math.max(0, slot.booked_count - 1);
        slot.available = slot.booked_count < slot.capacity;
      } catch (e) {
        alert(e.message);
      }
    },

    formatSlotTime(start, end) {
      const fmt = iso => new Date(iso).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const date = new Date(start).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      return `${date}  ${fmt(start)} – ${fmt(end)}`;
    },

    copyLink() {
      navigator.clipboard.writeText(`${location.origin}/book/${EVENT_ID}`);
      window.dispatchEvent(new CustomEvent('show-toast', { detail: { message: 'Link copied!', type: 'success' } }));
    },
  };
}
</script>
