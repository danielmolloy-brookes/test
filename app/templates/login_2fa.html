<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Two-factor authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Plus Jakarta Sans", "ui-sans-serif", "system-ui", "sans-serif"] } } } }
  </script>
  <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css" />
  <script src="/static/vendor/alpinejs.min.js" defer></script>
</head>
<body class="min-h-screen bg-slate-900 text-white flex items-center justify-center px-4"
      x-data="tfaApp()" x-init="init()">

  <div class="w-full max-w-sm">
    <!-- Icon -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-red-600/20 border border-red-500/40 flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-shield-alt text-2xl text-red-400"></i>
      </div>
      <h1 class="text-2xl font-bold">Two-factor authentication</h1>
      <p class="text-slate-400 text-sm mt-1">Enter the code from your authenticator app</p>
    </div>

    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 space-y-4">

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1">6-digit code</label>
        <input x-model="code" type="text" inputmode="numeric" pattern="[0-9A-Fa-f ]*"
               maxlength="9" autofocus
               @keydown.enter="submit()"
               class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-center text-2xl font-mono tracking-widest focus:outline-none focus:border-red-500"
               placeholder="000000"/>
        <p class="text-xs text-slate-500 mt-1.5 text-center">Or enter a backup code</p>
      </div>

      <div x-show="error" class="text-red-400 text-sm bg-red-900/20 border border-red-700/40 rounded-lg px-4 py-2.5 text-center" x-text="error"></div>

      <button @click="submit()" :disabled="submitting"
        class="w-full bg-red-600 hover:bg-red-700 transition font-semibold rounded-xl py-3 text-sm flex items-center justify-center gap-2 disabled:opacity-60">
        <span x-show="submitting" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        <span x-text="submitting ? 'Verifying…' : 'Verify'"></span>
      </button>

      <a href="/login" class="block text-center text-xs text-slate-500 hover:text-slate-300 transition mt-2">
        ← Back to login
      </a>
    </div>
  </div>

<script>
function tfaApp() {
  return {
    code:       '',
    error:      '',
    submitting: false,
    username:   '{{ username }}',

    init() {
      // Auto-submit when 6 digits entered
      this.$watch('code', v => {
        if (v.replace(/\s/g, '').length >= 6) this.submit();
      });
    },

    async submit() {
      if (this.submitting) return;
      this.submitting = true;
      this.error = '';
      try {
        const res = await fetch('/account/2fa/validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: this.username, code: this.code }),
          credentials: 'same-origin',
        });
        const data = await res.json();
        if (!res.ok) { this.error = data.detail || 'Invalid code'; this.code = ''; return; }
        // Cookie is set by server — redirect to home
        window.location.href = '/';
      } catch (e) {
        this.error = 'Network error — please try again';
      } finally {
        this.submitting = false;
      }
    },
  };
}
</script>
</body>
</html>
