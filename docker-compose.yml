version: "3.9"

services:
  app:
    build: .
    container_name: smart-checkin
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist database and QR codes outside the container
      - ./data:/app/data
      - ./static/qr_codes:/app/static/qr_codes
    environment:
      - DATABASE_URL=sqlite:///./data/checkin.db
      - QR_CODE_DIR=static/qr_codes
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  data:
